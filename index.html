<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <title>Interaktivna karta OŠ Vladimir Nazor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    h2 { text-align: center; margin: 10px 0; }
    #map { width: 100%; height: 600px; }
  </style>
</head>

<body>
  <h2>Interaktivna karta osnovnih škola „Vladimir Nazor“</h2>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    var map = L.map('map').setView([45.2, 16.4], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    var schools = [
      ["OŠ Vladimir Nazor Zagreb", 45.8150, 15.9819],
      ["OŠ Vladimir Nazor Pazin", 45.2403, 13.9364],
      ["OŠ Vladimir Nazor Vrsar", 45.1490, 13.6070],
      ["OŠ Vladimir Nazor Ploče", 43.0570, 17.4320],
      ["OŠ Vladimir Nazor Slavonski Brod", 45.1600, 18.0150],
      ["OŠ Vladimir Nazor Đakovo", 45.3080, 18.4100],
      ["OŠ Vladimir Nazor Križevci", 46.0210, 16.5420],
      ["OŠ Vladimir Nazor Sveti Ilija", 46.1990, 16.3030]
    ];

    schools.forEach(function(s) {
      L.marker([s[1], s[2]])
        .addTo(map)
        .bindPopup("<strong>" + s[0] + "</strong>");
    });
  </script>
</body>
</html>
